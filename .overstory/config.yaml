# Overstory configuration
# See: https://github.com/overstory/overstory

project:
  name: mulch
  root: /home/liker2/projects/os-eco/mulch
  canonicalBranch: main
  qualityGates:
    - name: Tests
      command: bun test
      description: all tests must pass
    - name: Lint
      command: bun run lint
      description: zero errors
    - name: Typecheck
      command: bun run typecheck
      description: no TypeScript errors
agents:
  manifestPath: .overstory/agent-manifest.json
  baseDir: .overstory/agent-defs
  maxConcurrent: 25
  staggerDelayMs: 2000
  maxDepth: 2
  maxSessionsPerRun: 0
  maxAgentsPerLead: 5
worktrees:
  baseDir: .overstory/worktrees
taskTracker:
  backend: auto
  enabled: true
  github:
    pollIntervalMs: 30000
    readyLabel: ov-ready
    activeLabel: ov-active
    maxConcurrent: 5
mulch:
  enabled: true
  domains: []
  primeFormat: markdown
merge:
  aiResolveEnabled: true
  reimagineEnabled: false
providers:
  anthropic:
    type: native
watchdog:
  tier0Enabled: true
  tier0IntervalMs: 30000
  tier1Enabled: false
  tier2Enabled: false
  staleThresholdMs: 300000
  zombieThresholdMs: 600000
  nudgeIntervalMs: 60000
mission:
  planReview:
    enabled: true
    tier: full
    maxRounds: 3
coordinator:
  autoPull: false
  exitTriggers:
    allAgentsDone: false
    taskTrackerEmpty: false
    onShutdownSignal: false
models:
logging:
  verbose: false
  redactSecrets: true
runtime:
  default: claude
  shellInitDelayMs: 0
  pi:
    provider: anthropic
    modelMap:
      opus: anthropic/claude-opus-4-6
      sonnet: anthropic/claude-sonnet-4-6
      haiku: anthropic/claude-haiku-4-5
rateLimit:
  enabled: true
  behavior: wait
  maxWaitMs: 3600000
  pollIntervalMs: 30000
  notifyCoordinator: true
  swapRuntime: null
mail:
  reliability:
    leaseTimeoutSec: 120
    maxRetries: 3
    backoffBaseMs: 5000
    backoffMaxMs: 60000
resilience:
  retry:
    maxAttempts: 3
    backoffBaseMs: 5000
    backoffMaxMs: 120000
    backoffMultiplier: 2
    globalMaxConcurrent: 5
  circuitBreaker:
    failureThreshold: 5
    windowMs: 600000
    cooldownMs: 300000
    halfOpenMaxProbes: 2
  reroute:
    enabled: false
    maxReroutes: 2
healthPolicy:
  enabled: false
  dryRun: false
  rules: []
  defaultCooldownMs: 300000
  evaluationIntervalMs: 60000
  maxPauseDurationMs: 600000
